<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#0b0e14"/>
  
  <!-- Subtle gradient glow behind the N -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#0b0e14" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Letter "N" centered, bold, with blue gradient -->
  <defs>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <text 
    x="256" 
    y="360" 
    text-anchor="middle" 
    font-family="Arial Black, Arial, sans-serif" 
    font-weight="900" 
    font-size="320" 
    fill="url(#nGrad)"
    letter-spacing="-10"
  >N</text>
</svg>
